<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-wallet"></i> Budget Tracker</h1>
                <p id="current-month" class="subtitle"></p>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
                <span>Dark</span>
            </button>
        </header>

        <section class="dashboard">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="balance">₹0.00</h2>
            </div>
            <div class="card income-card">
                <h3><i class="fa-solid fa-arrow-trend-up"></i> Income</h3>
                <h2 id="total-income">+₹0.00</h2>
            </div>
            <div class="card expense-card">
                <h3><i class="fa-solid fa-arrow-trend-down"></i> Expenses</h3>
                <h2 id="total-expense">-₹0.00</h2>
            </div>
        </section>

        <div class="main-grid">
            <div class="left-col">
                <section class="card form-section">
                    <h3>Add New Transaction</h3>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required></select>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="e.g., Groceries, Rent..." required>
                        </div>
                        <button type="submit" class="btn-submit">Add Transaction</button>
                    </form>
                </section>

                <section class="card chart-section">
                    <h3>Expenses by Category</h3>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <section class="card history-section">
                    <h3>Recent Transactions</h3>
                    <ul id="transaction-list" class="transaction-list"></ul>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
