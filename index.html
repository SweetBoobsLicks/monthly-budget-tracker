<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen" aria-live="polite">
        <div class="loading-card">
            <div class="loading-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
                    <defs>
                        <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4AB5A0" />
                            <stop offset="100%" stop-color="#2d8a7a" />
                        </linearGradient>
                        <filter id="drop-shadow">
                            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2" />
                        </filter>
                    </defs>
                    <!-- Background -->
                    <rect width="200" height="200" rx="45" fill="url(#icon-gradient)" />
                    <!-- Curved arrow -->
                    <path d="M 50 100 Q 80 60 110 70" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#drop-shadow)" />
                    <polygon points="110,70 125,45 135,75" fill="#ffffff" filter="url(#drop-shadow)" />
                    <!-- Growth arrows -->
                    <line x1="130" y1="85" x2="145" y2="70" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#drop-shadow)" />
                    <polygon points="145,70 155,55 165,80" fill="#ffffff" filter="url(#drop-shadow)" />
                    <!-- House with dollar sign -->
                    <g filter="url(#drop-shadow)">
                        <path d="M 70 140 L 70 100 L 55 85 L 55 100 L 40 100 L 40 145 L 100 145 L 100 100 L 85 100 L 85 140 Z" fill="#ffffff" />
                        <text x="70" y="125" font-size="35" font-weight="bold" fill="#2d8a7a" text-anchor="middle" font-family="Arial">$</text>
                    </g>
                    <!-- Coins -->
                    <g filter="url(#drop-shadow)">
                        <circle cx="105" cy="155" r="10" fill="none" stroke="#ffffff" stroke-width="3" />
                        <text x="105" y="158" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">¢</text>
                        <circle cx="125" cy="160" r="9" fill="none" stroke="#ffffff" stroke-width="2.5" />
                        <text x="125" y="163" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">$</text>
                    </g>
                </svg>
            </div>
            <div class="loading-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p>Preparing your budget dashboard...</p>
        </div>
    </div>

    <div class="container">
        <header class="page-header">
            <div class="header-content">
                <h1>
                    <span class="brand-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
                            <defs>
                                <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#4AB5A0" />
                                    <stop offset="100%" stop-color="#2d8a7a" />
                                </linearGradient>
                                <filter id="brand-shadow">
                                    <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.15" />
                                </filter>
                            </defs>
                            <!-- Background -->
                            <rect width="200" height="200" rx="45" fill="url(#brand-gradient)" />
                            <!-- Curved arrow -->
                            <path d="M 50 100 Q 80 60 110 70" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#brand-shadow)" />
                            <polygon points="110,70 125,45 135,75" fill="#ffffff" filter="url(#brand-shadow)" />
                            <!-- Growth arrows -->
                            <line x1="130" y1="85" x2="145" y2="70" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#brand-shadow)" />
                            <polygon points="145,70 155,55 165,80" fill="#ffffff" filter="url(#brand-shadow)" />
                            <!-- House with dollar sign -->
                            <g filter="url(#brand-shadow)">
                                <path d="M 70 140 L 70 100 L 55 85 L 55 100 L 40 100 L 40 145 L 100 145 L 100 100 L 85 100 L 85 140 Z" fill="#ffffff" />
                                <text x="70" y="125" font-size="35" font-weight="bold" fill="#2d8a7a" text-anchor="middle" font-family="Arial">$</text>
                            </g>
                            <!-- Coins -->
                            <g filter="url(#brand-shadow)">
                                <circle cx="105" cy="155" r="10" fill="none" stroke="#ffffff" stroke-width="3" />
                                <text x="105" y="158" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">¢</text>
                                <circle cx="125" cy="160" r="9" fill="none" stroke="#ffffff" stroke-width="2.5" />
                                <text x="125" y="163" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">$</text>
                            </g>
                        </svg>
                    </span>
                    Budget Tracker
                </h1>
                <p id="current-month" class="subtitle"></p>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
                <span>Dark</span>
            </button>
        </header>

        <section class="dashboard">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="balance">₹0.00</h2>
            </div>
            <div class="card income-card">
                <h3><i class="fa-solid fa-arrow-trend-up"></i> Income</h3>
                <h2 id="total-income">+₹0.00</h2>
            </div>
            <div class="card expense-card">
                <h3><i class="fa-solid fa-arrow-trend-down"></i> Expenses</h3>
                <h2 id="total-expense">-₹0.00</h2>
            </div>
        </section>

        <div class="main-grid">
            <div class="left-col">
                <section class="card form-section">
                    <h3>Add New Transaction</h3>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required></select>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="e.g., Groceries, Rent..." required>
                        </div>
                        <button type="submit" class="btn-submit">Add Transaction</button>
                    </form>
                </section>

                <section class="card chart-section">
                    <h3>Expenses by Category</h3>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <section class="card history-section">
                    <h3>Recent Transactions</h3>
                    <ul id="transaction-list" class="transaction-list"></ul>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
